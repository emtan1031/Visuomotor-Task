<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Visuomotor Prism Task</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
  cursor: none;
}
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>

<body>
<div id="info">Click anywhere to start</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const BLOCKS = [
  {name:"baseline",        trials:10, prism:[0,0]},
  {name:"adaptation",      trials:30, prism:[80,0]},
  {name:"adaptation_cont", trials:20, prism:[80,0]},
  {name:"aftereffect",     trials:10, prism:[0,0]}
];

let blockIndex = 0;
let trial = 0;
let trial_in_block = 0;

let target = null;
let startTime = 0;
let data = [];

let prism_dx = 0;
let prism_dy = 0;
let time_pressure = false;
let dual_task = false;

let running = false;
let trialActive = false;
let isDragging = false;

let redX = canvas.width / 2;
let redY = canvas.height / 2;

const MIN_TARGET_RADIUS = 180;

// ── pointer lock ──────────────────────────────────────────────────────
// once locked, mousemove gives us raw movementX/Y with no screen-edge limit
document.addEventListener("click", () => {
  if (!document.pointerLockElement) {
    canvas.requestPointerLock();
  }
});

document.addEventListener("pointerlockchange", () => {
  if (document.pointerLockElement === canvas) {
    // locked — good, raw movement now flows in
  }
});

// ── movement: pure deltas, no absolute position involved ──────────────
document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  redX += e.movementX;
  redY += e.movementY;

  // clamp so dot can't leave the canvas
  redX = Math.max(0, Math.min(canvas.width,  redX));
  redY = Math.max(0, Math.min(canvas.height, redY));

  draw();
});

document.addEventListener("mousedown", (e) => {
  if (!running) {
    running = true;
    document.getElementById("info").innerText = "";
    newTrial();
    return;
  }

  if (e.button === 0 && trialActive) {
    isDragging = true;
    startTime = performance.now();
  }
});

document.addEventListener("mouseup", (e) => {
  if (e.button === 0 && isDragging) {
    isDragging = false;
    if (trialActive) {
      recordResponse(redX, redY);
    }
  }
});

function newTrial() {
  const block = BLOCKS[blockIndex];
  prism_dx = block.prism[0];
  prism_dy = block.prism[1];

  // red dot always resets to exact center
  redX = canvas.width / 2;
  redY = canvas.height / 2;

  const angle = Math.random() * 2 * Math.PI;
  const minR = MIN_TARGET_RADIUS;
  const maxR = Math.min(canvas.width, canvas.height) * 0.38;
  const r = minR + Math.random() * (maxR - minR);

  target = {
    x: canvas.width  / 2 + r * Math.cos(angle),
    y: canvas.height / 2 + r * Math.sin(angle)
  };

  trialActive = true;

  document.getElementById("info").innerText =
    `Block: ${block.name} | Trial ${trial_in_block + 1}/${block.trials}`;

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (target && trialActive) {
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(target.x + prism_dx, target.y + prism_dy, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(redX, redY, 10, 0, Math.PI * 2);
  ctx.fill();
}

function recordResponse(touchX, touchY) {
  trialActive = false;

  const rt = performance.now() - startTime;
  const error = Math.sqrt((touchX - target.x) ** 2 + (touchY - target.y) ** 2);

  data.push({
    timestamp_utc:    new Date().toISOString(),
    trial:            trial,
    block:            BLOCKS[blockIndex].name,
    trial_in_block:   trial_in_block,
    target_x:         Math.round(target.x),
    target_y:         Math.round(target.y),
    disp_target_x:    Math.round(target.x + prism_dx),
    disp_target_y:    Math.round(target.y + prism_dy),
    touch_x:          Math.round(touchX),
    touch_y:          Math.round(touchY),
    response_time_ms: Math.round(rt),
    error_px:         Math.round(error),
    prism_dx:         prism_dx,
    prism_dy:         prism_dy,
    time_pressure:    time_pressure ? 1 : 0,
    dual_task:        dual_task ? 1 : 0
  });

  draw();

  setTimeout(() => {
    trial++;
    trial_in_block++;

    if (trial_in_block >= BLOCKS[blockIndex].trials) {
      blockIndex++;
      trial_in_block = 0;
      if (blockIndex >= BLOCKS.length) {
        finish();
        return;
      }
    }
    newTrial();
  }, 300);
}

function finish() {
  // release pointer lock when done
  document.exitPointerLock();

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  ctx.font = "28px Arial";
  ctx.fillText("Experiment complete. Downloading data...", 60, canvas.height / 2);

  const header = "timestamp_utc,trial,block,trial_in_block,target_x,target_y," +
    "disp_target_x,disp_target_y,touch_x,touch_y,response_time_ms,error_px," +
    "prism_dx,prism_dy,time_pressure,dual_task\n";

  const rows = data.map(d =>
    `${d.timestamp_utc},${d.trial},${d.block},${d.trial_in_block},` +
    `${d.target_x},${d.target_y},${d.disp_target_x},${d.disp_target_y},` +
    `${d.touch_x},${d.touch_y},${d.response_time_ms},${d.error_px},` +
    `${d.prism_dx},${d.prism_dy},${d.time_pressure},${d.dual_task}`
  ).join("\n");

  const blob = new Blob([header + rows], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "visuomotor_data.csv";
  a.click();
}

draw();
</script>
</body>
</html>
