<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Visuomotor Prism Task</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
  cursor: none;
  touch-action: none;
}
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
  pointer-events: none;
  font-size: 20px;
}
</style>
</head>

<body>
<div id="info">Tap anywhere to start</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const CX = canvas.width / 2;
const CY = canvas.height / 2;

const BLOCKS = [
  {name:"baseline",        trials:10, prism:[0,0]},
  {name:"adaptation",      trials:30, prism:[80,0]},
  {name:"adaptation_cont", trials:20, prism:[80,0]},
  {name:"aftereffect",     trials:10, prism:[0,0]}
];

let blockIndex = 0;
let trial = 0;
let trial_in_block = 0;

let target = null;
let startTime = 0;
let data = [];

let prism_dx = 0;
let prism_dy = 0;
let time_pressure = false;
let dual_task = false;

let running = false;
let trialActive = false;

// red dot
let redX = CX;
let redY = CY;
let showRed = true;

const MIN_DIST_FROM_CENTER = 180; // min horizontal distance from center

function newTrial() {
  const block = BLOCKS[blockIndex];
  prism_dx = block.prism[0];
  prism_dy = block.prism[1];

  // target is left or right of center, vertically centered
  const side = Math.random() < 0.5 ? -1 : 1;
  const minD = MIN_DIST_FROM_CENTER;
  const maxD = (canvas.width / 2) - 80;
  const dist = minD + Math.random() * (maxD - minD);

  target = {
    x: CX + side * dist,
    y: CY
  };

  // red dot resets to center
  redX = CX;
  redY = CY;
  showRed = true;

  trialActive = true;
  startTime = performance.now();

  document.getElementById("info").innerText =
    `Block: ${block.name} | Trial ${trial_in_block + 1}/${BLOCKS[blockIndex].trials}`;

  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // green target (displaced by prism)
  if (target && trialActive) {
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(target.x + prism_dx, target.y + prism_dy, 18, 0, Math.PI * 2);
    ctx.fill();
  }

  // red dot
  if (showRed) {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(redX, redY, 14, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── TOUCH HANDLING ────────────────────────────────────────────────────

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();

  if (!running) {
    running = true;
    document.getElementById("info").innerText = "";
    newTrial();
    return;
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();

  if (!trialActive) return;

  const touch = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  recordResponse(tx, ty);
}, { passive: false });

function recordResponse(touchX, touchY) {
  trialActive = false;

  const rt = performance.now() - startTime;
  const error = Math.sqrt((touchX - target.x) ** 2 + (touchY - target.y) ** 2);

  data.push({
    timestamp_utc:    new Date().toISOString(),
    trial:            trial,
    block:            BLOCKS[blockIndex].name,
    trial_in_block:   trial_in_block,
    target_x:         Math.round(target.x),
    target_y:         Math.round(target.y),
    disp_target_x:    Math.round(target.x + prism_dx),
    disp_target_y:    Math.round(target.y + prism_dy),
    touch_x:          Math.round(touchX),
    touch_y:          Math.round(touchY),
    response_time_ms: Math.round(rt),
    error_px:         Math.round(error),
    prism_dx:         prism_dx,
    prism_dy:         prism_dy,
    time_pressure:    time_pressure ? 1 : 0,
    dual_task:        dual_task ? 1 : 0
  });

  // move red dot to where they tapped
  redX = touchX;
  redY = touchY;
  draw();

  // hold red dot for 1 second, then advance
  setTimeout(() => {
    showRed = false;
    draw();

    setTimeout(() => {
      trial++;
      trial_in_block++;

      if (trial_in_block >= BLOCKS[blockIndex].trials) {
        blockIndex++;
        trial_in_block = 0;
        if (blockIndex >= BLOCKS.length) {
          finish();
          return;
        }
      }
      newTrial();
    }, 200); // brief blank before next trial
  }, 1000); // red dot stays visible for 1s
}

function finish() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  ctx.font = "32px Arial";
  ctx.fillText("Experiment complete. Downloading data...", 60, CY);

  const header = "timestamp_utc,trial,block,trial_in_block,target_x,target_y," +
    "disp_target_x,disp_target_y,touch_x,touch_y,response_time_ms,error_px," +
    "prism_dx,prism_dy,time_pressure,dual_task\n";

  const rows = data.map(d =>
    `${d.timestamp_utc},${d.trial},${d.block},${d.trial_in_block},` +
    `${d.target_x},${d.target_y},${d.disp_target_x},${d.disp_target_y},` +
    `${d.touch_x},${d.touch_y},${d.response_time_ms},${d.error_px},` +
    `${d.prism_dx},${d.prism_dy},${d.time_pressure},${d.dual_task}`
  ).join("\n");

  const blob = new Blob([header + rows], {type: "text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "visuomotor_data.csv";
  a.click();
}

draw();
</script>
</body>
</html>
